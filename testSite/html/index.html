<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Site</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>


    <header class="header">
        
            <div class="brand">
                <img class="logo" src="../images/logo.png" alt="logo">
                <h1 class="site-title">Мебель</h1>
            </div>

            <button class="theme-toggle">Переключить тему</button>
        
    </header>


    <main class="container">

        <div class="cards-wrapper">
            <button class="nav-arrow left" >‹-</button>

            <div class="cards">

                <div class="card">
                    <img src="../images/stul.jpg" alt="stul">
                    <div class="card-body">
                        <h3 class="card-title">Стул</h3>
                        <p class="card-price">25 590 руб</p>
                       
                    </div>
                </div>

                <div class="card">
                    <img src="../images/stol.png" alt="stol">
                    <div class="card-body">
                        <h3 class="card-title">Стол</h3>
                        <p class="card-price">10 990 руб</p>
                        
                    </div>
                </div>

                <div class="card">
                    <img src="../images/shkaf.jpg" alt="shkaf">
                    <div class="card-body">
                        <h3 class="card-title">Шкаф</h3>
                        <p class="card-price">42 679 руб</p>

                    </div>
                </div>
            </div>

            <button class="nav-arrow right">-›</button>
        </div>
    </main>


    <footer>
        
    </footer>


    <script src="../js/script.js"></script>
</body>
</html>
